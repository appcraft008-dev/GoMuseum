<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GoMuseum · 随身博物馆导览手册</title>
<meta name="description" content="拍照识别展品，聆听 AI 讲解。GoMuseum——你的随身博物馆导览手册。" />
<style>
  :root { --bg:#F3EDDF; --surface:#FBF7EC; --ink:#2C2316; --sub:#8A7A5F; --faint:#B0A283; --line:#DCD2B8; --accent:#A14E28; --accent-deep:#7E3A1C; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--ink); font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .serif { font-family:'Noto Serif SC','Songti SC',serif; }
  main { max-width:560px; padding:64px 28px 48px; text-align:center; }
  .masthead { font-size:15px; letter-spacing:7px; font-weight:700; }
  .diamond { display:flex; align-items:center; gap:8px; width:150px; margin:12px auto; }
  .diamond::before,.diamond::after { content:''; flex:1; height:1px; background:var(--faint); }
  .diamond span { width:5px; height:5px; background:var(--accent); transform:rotate(45deg); }
  .tagline { font-size:11px; letter-spacing:3px; color:var(--sub); }
  h1 { font-size:30px; line-height:1.55; font-weight:700; margin:36px 0 16px; }
  .desc { font-size:14px; line-height:1.9; color:var(--sub); margin-bottom:36px; }
  .ticket { display:inline-block; background:var(--accent); color:var(--surface); border-radius:4px; padding:7px; text-decoration:none; }
  .ticket span { display:flex; align-items:center; gap:10px; border:1px dashed rgba(251,247,236,.45); border-radius:2px; padding:13px 26px; font-family:'Noto Serif SC',serif; font-size:16px; letter-spacing:2px; font-weight:600; }
  .note { margin-top:14px; font-size:12px; color:var(--sub); }
  footer { margin-top:auto; padding:24px; font-size:11.5px; color:var(--faint); display:flex; gap:18px; }
  footer a { color:var(--sub); text-decoration:none; border-bottom:1px solid var(--line); }
</style>
</head>
<body>
<main>
  <div class="serif masthead">GOMUSEUM</div>
  <div class="diamond"><span></span></div>
  <div class="tagline">随身博物馆导览手册</div>
  <h1 class="serif">走近一件作品，<br/>听懂它的故事。</h1>
  <p class="desc">拍照识别展品 · AI 讲解与问答 · 多语言语音导览<br/>从巴黎奥赛博物馆开始，把博物馆装进口袋。</p>
  <a class="ticket" href="https://play.google.com/apps/internaltest/4701612575590307171"><span>🎟 加入 Android 内测</span></a>
  <p class="note">iOS 版本即将到来</p>
</main>
<footer>
  <a href="/privacy.html">隐私政策</a>
  <a href="/terms.html">使用条款</a>
  <span>© 2026 GoMuseum</span>
</footer>
</body>
</html>
