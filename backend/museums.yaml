# 馆配置：加一个馆 = 加一段
museums:
  orsay:
    name_zh: 奥赛博物馆
    name_en: Musée d'Orsay
    city_zh: 巴黎
    city_en: Paris
    country: FR
    wikidata_qid: Q23402
    category_filter: Q3305213   # 主类目(兜底)
    # 四大类(通用分类法映射见 category_config.CATEGORY_BY_QID):
    # 绘画+壁画 / 雕塑+雕像+半身像+小像 / 纸上(素描水彩色粉版画习作草图) / 摄影
    categories: [Q3305213, Q219423,
                 Q860861, Q179700, Q241045, Q1066288,
                 Q93184, Q18761202, Q12043905, Q15123870, Q2647254, Q5078274,
                 Q125191]
    country_lang: fr
    sources: [joconde, wikipedia]   # 每馆补充源；Wikidata 是脊柱不在此列
    joconde_museum: "musée d'Orsay"   # JocondeCatalog 补纸上作品(Wikidata 覆盖偏科)
    fetch_limit: 12000              # 全条目5353+多P31重复行(P18已OPTIONAL,无图件也收)
    sample_size: 30
    sample_qids: []
  orangerie:
    name_zh: 橘园美术馆
    name_en: Musée de l'Orangerie
    city_zh: 巴黎
    city_en: Paris
    country: FR
    wikidata_qid: Q726781
    category_filter: Q3305213
    categories: [Q3305213, Q219423,
                 Q860861, Q179700, Q241045, Q1066288,
                 Q93184, Q18761202, Q12043905, Q15123870, Q2647254, Q5078274,
                 Q125191]
    country_lang: fr
    sources: [joconde, wikipedia]
    joconde_museum: "musée de l'Orangerie des Tuileries"
    fetch_limit: 500
    sample_size: 10
    sample_qids: []
