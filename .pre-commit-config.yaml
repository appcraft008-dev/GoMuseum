# GoMuseum Pre-commit 配置
repos:
  # Dart/Flutter 代码检查
  - repo: https://github.com/dart-lang/dart_pre_commit_hooks
    rev: 'v2.1.0'
    hooks:
      - id: dart-format
        files: '\.dart$'
        args: ['--line-length', '80', '--set-exit-if-changed']
      - id: dart-analyze
        files: '\.dart$'

  # Python 代码格式化和检查
  - repo: https://github.com/psf/black
    rev: '23.12.1'
    hooks:
      - id: black
        files: '^backend/.*\.py$'
        args: ['--line-length=88']

  - repo: https://github.com/pycqa/isort
    rev: '5.13.2'
    hooks:
      - id: isort
        files: '^backend/.*\.py$'
        args: ['--profile', 'black', '--line-length', '88']

  - repo: https://github.com/pycqa/flake8
    rev: '6.1.0'
    hooks:
      - id: flake8
        files: '^backend/.*\.py$'
        args: ['--max-line-length=88', '--extend-ignore=E203,W503']

  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v4.5.0'
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-added-large-files
        args: ['--maxkb=500']

  # 安全检查
  - repo: https://github.com/Yelp/detect-secrets
    rev: 'v1.4.0'
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.lock$|^\.dart_tool/|^build/'

  # Dockerfile 检查
  - repo: https://github.com/hadolint/hadolint
    rev: 'v2.12.0'
    hooks:
      - id: hadolint-docker
        files: 'Dockerfile.*'

  # Markdown 格式检查
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: 'v0.38.0'
    hooks:
      - id: markdownlint
        args: ['--fix']
        files: '\.md$'