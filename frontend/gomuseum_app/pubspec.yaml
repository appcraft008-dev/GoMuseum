name: gomuseum_app
description: GoMuseum Flutter frontend app
version: 0.1.0+3
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # 路由
  go_router: ^13.0.0

  # 本地数据库
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.3

  # 网络请求
  dio: ^5.4.0

  # 图片处理
  image_picker: ^1.0.5
  camera: ^0.10.5
  cross_file: ^0.3.3

  # HTTP 解析器
  http_parser: ^4.0.2

  # 工具
  dartz: ^0.10.1
  crypto: ^3.0.3
  intl: ^0.20.2
  equatable: ^2.0.5
  shared_preferences: ^2.2.2

  # 音频播放
  just_audio: ^0.9.36

  # 语音识别
  speech_to_text: ^7.3.0
  permission_handler: ^11.1.0

  # 应用内购买
  in_app_purchase: ^3.1.11

  # 设备信息
  device_info_plus: ^10.1.0

  # 国际化
  easy_localization: ^3.0.3

  # 认证和安全存储
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0

  # 社交登录
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^7.0.1

  # JWT解码
  dart_jsonwebtoken: ^2.12.1
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.0
  drift_dev: ^2.16.0

  # 测试
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/art/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: '#F3EDDF'
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png
  remove_alpha_ios: true
