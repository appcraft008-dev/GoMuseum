name: Deploy
run-name: "Deploy → ${{ inputs.target || 'staging' }}"

# 触发模型（借鉴 myPlantMate，去掉 workflow_run 间接触发）：
#   - push staging → 【自动】部署 staging（PR 合并前 CI 已过，push 到 staging 即代码已通过 CI）
#   - workflow_dispatch（target=production/staging）→ 【手动】部署。prod 只走这条，
#     App 审核期间避免误合并直冲生产。
# 相比旧的 workflow_run：运行直接归属真实分支、不依赖 CI 的 name 字符串匹配、CI/CD 可并行。
# 依赖仓库 Secrets：VPS_SSH_KEY / VPS_HOST。
on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标环境'
        type: choice
        options: [production, staging]
        default: production

# 同目标串行排队（并发 compose recreate 会留改名残留容器→撞名失败）
concurrency:
  group: deploy-${{ inputs.target || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → ${{ inputs.target || 'staging' }}
    runs-on: ubuntu-latest
    steps:
      - name: 解析部署目标
        id: t
        run: |
          TARGET="${{ inputs.target || 'staging' }}"
          if [ "$TARGET" = "production" ]; then
            echo "src_dir=/opt/gomuseum/backend"        >> "$GITHUB_OUTPUT"
            echo "compose_dir=/opt/gomuseum/deploy"      >> "$GITHUB_OUTPUT"
          else
            echo "src_dir=/opt/gomuseum/staging/backend" >> "$GITHUB_OUTPUT"
            echo "compose_dir=/opt/gomuseum/staging"     >> "$GITHUB_OUTPUT"
          fi
          echo "▶ 部署目标：$TARGET"

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 同步后端源码到 VPS
        # 排除虚拟环境/缓存/运行时音频；compose 目录的 .env 不在 backend/ 内，不受影响
        run: |
          rsync -az --delete \
            --exclude '.venv/' --exclude '__pycache__/' --exclude '*.pyc' \
            --exclude 'tts_cache/' --exclude '.pytest_cache/' --exclude 'app/storage/' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            backend/ "root@${{ secrets.VPS_HOST }}:${{ steps.t.outputs.src_dir }}/"

      - name: 构建并启动（含 alembic 迁移，--wait 等健康检查）
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no "root@${{ secrets.VPS_HOST }}" \
            "cd '${{ steps.t.outputs.compose_dir }}' && docker compose up -d --build --remove-orphans --wait && docker compose ps"
