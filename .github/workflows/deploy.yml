name: Deploy
run-name: "Deploy → ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'production' || 'staging') }}"

# 全自动 CD（借鉴 myPlantMate）：
#   - push staging（合并后）→ 自动部署 staging（VPS /opt/gomuseum/staging，端口 8101）
#   - push main（合并后）   → 自动部署 prod   （VPS /opt/gomuseum/deploy，端口 8100）
#   - workflow_dispatch     → 手动部署（target=production/staging，按需）
# path-aware：仅当 backend/ 改动时才部署（纯前端/文档/workflow 改动连工作流都不启动，真正"不触发"）；
#             手动 dispatch 强制部署（不受 paths 限制）。
# 依赖仓库 Secrets：VPS_SSH_KEY / VPS_HOST。
on:
  push:
    branches: [main, staging]
    # 触发器层路径过滤：纯前端/文档/workflow 改动不启动 CD（job 层 changes 过滤保留作双保险）。
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标环境'
        type: choice
        options: [production, staging]
        default: production

# 同目标串行排队（并发 compose recreate 会留改名残留容器→撞名失败）
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # push 时检测 backend 是否改动；dispatch 时跳过（强制部署）
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      backend: ${{ steps.f.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - id: f
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

  deploy:
    # 静态名（skipped 的 job 不渲染 name 表达式会显示原始字符串；目标看 run-name/解析步骤）
    name: Deploy
    needs: changes
    # 手动 dispatch 强制部署；push 仅在 backend 改动时部署
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: 解析部署目标
        id: t
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi
          if [ "$TARGET" = "production" ]; then
            echo "src_dir=/opt/gomuseum/backend"        >> "$GITHUB_OUTPUT"
            echo "compose_dir=/opt/gomuseum/deploy"      >> "$GITHUB_OUTPUT"
          else
            echo "src_dir=/opt/gomuseum/staging/backend" >> "$GITHUB_OUTPUT"
            echo "compose_dir=/opt/gomuseum/staging"     >> "$GITHUB_OUTPUT"
          fi
          echo "▶ 部署目标：$TARGET"

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 同步后端源码到 VPS
        # 排除虚拟环境/缓存/运行时音频；compose 目录的 .env 不在 backend/ 内，不受影响
        run: |
          rsync -az --delete \
            --exclude '.venv/' --exclude '__pycache__/' --exclude '*.pyc' \
            --exclude 'tts_cache/' --exclude '.pytest_cache/' --exclude 'app/storage/' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            backend/ "root@${{ secrets.VPS_HOST }}:${{ steps.t.outputs.src_dir }}/"

      - name: 构建并启动（含 alembic 迁移，--wait 等健康检查）
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no "root@${{ secrets.VPS_HOST }}" \
            "cd '${{ steps.t.outputs.compose_dir }}' && docker compose up -d --build --remove-orphans --wait && docker compose ps"
