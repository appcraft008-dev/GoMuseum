# GoMuseum CI/CD 流水线配置（适配个人用户，无 GHAS）
name: GoMuseum CI

on:
  push:
    branches: [ main, staging, 'feature/**' ]
  pull_request:
    branches: [ main, staging ]

jobs:
  # 基础安全扫描（保存为 artifact，而不是上传到 Security tab）
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # 构建检查（占位符，确保 CI 跑通）
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dummy build
        run: |
          echo "✅ 项目构建检查通过 (占位符)"


  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [build-check]               # 等 build-check 跑完再扫
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0               # 必须：让 Sonar 有完整历史用于比对/注释

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # 如果根目录已有 sonar-project.properties，通常无需额外 args
          # 如需在 YAML 里覆盖，也可以传 -D 参数，例如：
          # args: >
          #   -Dsonar.organization=${{ secrets.SONAR_ORG }}
          #   -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          #   -Dsonar.python.version=3.11
          #   -Dsonar.exclusions=**/node_modules/**,**/.venv/**,**/build/**




  coverage-upload:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: [build-check]           # 等前面检查/测试完成
    steps:
      - uses: actions/checkout@v4

      # Flutter/Dart 覆盖率（coverage/lcov.info）
      - name: Upload Flutter coverage (if exists)
        if: hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: true

      # Python 覆盖率（backend/coverage.xml）
      - name: Upload Backend coverage (if exists)
        if: hashFiles('backend/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: true

