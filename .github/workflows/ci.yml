# GoMuseum CI/CD 流水线配置（适配个人用户，无 GHAS）
name: GoMuseum CI

on:
  push:
    branches: [ main, staging, 'feature/**' ]
  pull_request:
    branches: [ main, staging ]

jobs:
  # 基础安全扫描（保存为 artifact，而不是上传到 Security tab）
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  # 构建检查（占位符，确保 CI 跑通）
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security-scan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dummy build
        run: |
          echo "✅ 项目构建检查通过 (占位符)"

