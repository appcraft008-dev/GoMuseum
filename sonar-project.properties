sonar.organization=appcraft008-dev            # 换成你的 org slug
sonar.projectKey=appcraft008-dev_GoMuseum     # 换成你的项目 key
sonar.projectName=GoMuseum

# 扫描范围（排除大文件夹与生成物）
sonar.sources=.
sonar.exclusions=**/*.md,**/*.png,**/*.jpg,**/node_modules/**,**/.venv/**,**/coverage/**,**/dist/**,**/build/**,**/android/**/generated/**,**/ios/**/GeneratedPluginRegistrant.*

# 覆盖率报告（等你有了报告再生效；不存在不会让扫描失败）
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
# 如果以后 Dart/Flutter 生成 lcov，可保留由 JS/TS 路径读取，或根据官方指引调整

