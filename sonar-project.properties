sonar.organization=appcraft008-dev
sonar.projectKey=appcraft008-dev_GoMuseum
sonar.projectName=GoMuseum
sonar.host.url=https://sonarcloud.io

# 源代码路径
sonar.sources=backend/app,frontend/gomuseum_app/lib,scripts

# 排除不需要分析的目录
sonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/coverage/**,**/htmlcov/**,**/dist/**,**/build/**,**/.dart_tool/**,**/generated/**,**/*.g.dart,**/*.freezed.dart,**/models/**,backend/alembic/**

# 测试代码路径
sonar.tests=backend/tests,frontend/gomuseum_app/test

# 测试排除项
sonar.test.exclusions=**/*_test.dart,**/test_*.py

# 覆盖率报告路径
sonar.javascript.lcov.reportPaths=frontend/gomuseum_app/coverage/lcov.info
sonar.python.coverage.reportPaths=backend/coverage.xml

# 编码
sonar.sourceEncoding=UTF-8

# Python特定配置
sonar.python.version=3.11

