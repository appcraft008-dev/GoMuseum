sonar.organization=appcraft008-dev
sonar.projectKey=appcraft008-dev_GoMuseum
sonar.projectName=GoMuseum
sonar.host.url=https://sonarcloud.io

# 源代码路径
sonar.sources=backend/app,frontend/gomuseum_app/lib,scripts

# 排除不需要分析的目录
sonar.exclusions=**/node_modules/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/coverage/**,**/htmlcov/**,**/dist/**,**/build/**,**/.dart_tool/**,**/generated/**,**/*.g.dart,**/*.freezed.dart,backend/alembic/**

# 测试代码路径 - 暂时只扫描backend测试,Flutter测试在CI中独立运行
sonar.tests=backend/tests

# 测试排除项
sonar.test.exclusions=**/test_*.py

# 覆盖率报告路径
sonar.python.coverage.reportPaths=backend/coverage.xml

# 编码
sonar.sourceEncoding=UTF-8

# Python特定配置
sonar.python.version=3.11

