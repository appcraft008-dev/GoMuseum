services:
  db:
    image: postgres:16
    container_name: gomuseum-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gomuseum
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    container_name: gomuseum-redis
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gomuseum-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/gomuseum
      REDIS_URL: redis://redis:6379/0
      # AI API Keys - 请替换为您的真实密钥
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # AI Performance Settings
      AI_STRATEGY_TIMEOUT: ${AI_STRATEGY_TIMEOUT:-30}
      AI_TOTAL_TIMEOUT: ${AI_TOTAL_TIMEOUT:-60}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-30}
      ANTHROPIC_TIMEOUT: ${ANTHROPIC_TIMEOUT:-30}
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gomuseum-frontend
    restart: always
    ports:
      - '3000:3000'

volumes:
  db_data:
